# .github/workflows/deploy.yml
# Builds the Docker image, pushes to ECR, and forces a new ECS deployment.
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   ECR_REGISTRY  → e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com
#   ECR_REPO      → e.g. pokemon-mcp-server
#   ECS_CLUSTER   → e.g. mcp-cluster
#   ECS_SERVICE   → e.g. pokemon-mcp-service

name: Deploy to ECS Fargate

on:
  push:
    branches: [main]
  # Permite lanzar el redeploy a mano desde la pestaña Actions de GitHub.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag adicional (además del SHA y latest). Opcional."
        required: false
        default: ""

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build → ECR → Fargate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image to ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}

          docker build -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest .
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

          # Tag adicional opcional desde workflow_dispatch (ej. "v1.2.0")
          EXTRA_TAG="${{ github.event.inputs.image_tag }}"
          if [ -n "$EXTRA_TAG" ]; then
            docker tag $IMAGE_URI:$IMAGE_TAG $IMAGE_URI:$EXTRA_TAG
            docker push $IMAGE_URI:$EXTRA_TAG
          fi

          echo "IMAGE_URI=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
